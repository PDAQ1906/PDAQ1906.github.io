<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Canvas and Video </title>
    <style>
        #canvas1, #canvas2 {
            width: 300px;
            height: 300px;
            border: 1px solid black;
        }
        #video{
            width: 300px;
            height: 300px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <canvas id="canvas2"></canvas>
    <video id="video" controls src="video.mp4"></video>

    <script async src="https://docs.opencv.org/master/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script>
        var canvas1 = document.getElementById("canvas1");
        var canvas2 = document.getElementById("canvas2");
        var video = document.getElementById("video");

        var context1 = canvas1.getContext("2d");
        var context2 = canvas2.getContext("2d");

        video.addEventListener('play', function() {
            setInterval(function() {
                context1.drawImage(video, 0, 0, canvas1.width, canvas1.height);

             
                var imgData = context1.getImageData(0, 0, canvas1.width, canvas1.height);
                var src = cv.matFromImageData(imgData);


                var grayscale = new cv.Mat();
                cv.cvtColor(src, grayscale, cv.COLOR_RGBA2GRAY);

                // Apply Sobel filter
                var sobel = new cv.Mat();
                var depth = cv.CV_8U; // Change this value to adjust the depth of the output image
                var dx = 1; // Change these values to adjust the gradient direction
                var dy = 0;
                var ksize = 3; // Change this value to adjust the filter size
                var scale = 1;
                var delta = 0;
                cv.Sobel(grayscale, sobel, depth, dx, dy, ksize, scale, delta);

                // Invert the colors
                var inverted = new cv.Mat();
                cv.bitwise_not(sobel, inverted);

                // Draw the Sobel filter result to the second canvas
                cv.imshow(canvas2, sobel);

    

            }, 20);
        }, false);

        // Function called when OpenCV is ready
        function onOpenCvReady() {
            console.log('OpenCV is ready');
        }
    </script>
</body>
</html>
